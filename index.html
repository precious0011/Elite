<section id="registration">
    <h2>Register as a Young Talent</h2>
    <form class="registration-form" id="registrationForm">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="Your Full Name" required>
        
        <label for="age">Age</label>
        <input type="number" id="age" min="8" max="18" placeholder="Your Age (8-18)" required>
        
        <label for="position">Preferred Position</label>
        <select id="position" required>
            <option value="">Select Position</option>
            <option value="Goalkeeper">Goalkeeper</option>
            <option value="Defender">Defender</option>
            <option value="Midfielder">Midfielder</option>
            <option value="Forward">Forward</option>
        </select>
        
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Your Email" required>
        
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" placeholder="Your Phone Number" required>
        
        <label for="parent-name">Parent/Guardian Name</label>
        <input type="text" id="parent-name" placeholder="Parent/Guardian Name" required>
        
        <label for="experience">Previous Experience</label>
        <textarea id="experience" rows="4" placeholder="Tell us about your football experience"></textarea>
        
        <button type="submit">Submit Registration</button>
    </form>
</section>

<script>
    document.getElementById('registrationForm').addEventListener('submit', function(event) {
        event.preventDefault();
        const formData = {
            name: document.getElementById('name').value,
            age: document.getElementById('age').value,
            position: document.getElementById('position').value,
            email: document.getElementById('email').value,
            phone: document.getElementById('phone').value,
            parentName: document.getElementById('parent-name').value,
            experience: document.getElementById('experience').value
        };
        if (formData.name && formData.age && formData.position && formData.email && formData.phone && formData.parentName) {
            alert('Thank you for registering! We will contact you soon.');
            this.reset();
        } else {
            alert('Please fill out all required fields.');
        }
    });
</script>
